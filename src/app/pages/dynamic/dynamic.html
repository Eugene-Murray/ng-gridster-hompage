<section class="py-5">
  <div class="container">
    <h1 class="fw-bold mb-4">Dynamic Components</h1>
    <div class="row g-4">

      <!-- Available list -->
      <div class="col-md-3">
        <h5 class="mb-3">Available</h5>
        <ul class="list-group">
          @for (item of available; track item.name) {
            <li class="list-group-item d-flex justify-content-between align-items-center">
              <span>{{ item.name }}</span>
              <button class="btn btn-sm btn-primary" (click)="add(item)">Add</button>
            </li>
          } @empty {
            <li class="list-group-item text-muted fst-italic">All added</li>
          }
        </ul>
      </div>

      <!-- Active section -->
      <div class="col-md-9">
        <h5 class="mb-3">Active</h5>
        @if (active.length === 0) {
          <p class="text-muted fst-italic">No active components. Select one from the list.</p>
        }
        <div class="row g-3">
          @for (item of active; track item.name) {
            <div class="col-sm-6 col-lg-4">
              <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center py-2">
                  <span class="fw-semibold">{{ item.name }}</span>
                  <button class="btn btn-sm btn-outline-danger" (click)="remove(item)">Remove</button>
                </div>
                <div class="card-body p-0" style="min-height: 120px;">
                  <ng-container [ngComponentOutlet]="item.component" />
                </div>
              </div>
            </div>
          }
        </div>
      </div>

    </div>
  </div>
</section>
